services:
  # 后端服务
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: happy8-backend
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Shanghai
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - happy8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: happy8-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - happy8-network

networks:
  happy8-network:
    driver: bridge
