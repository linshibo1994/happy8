version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: happy8-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: happy8_root_2025
      MYSQL_DATABASE: happy8_miniprogram
      MYSQL_USER: happy8_user
      MYSQL_PASSWORD: happy8_pass_2025
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - happy8-network

  # Redis缓存
  redis:
    image: redis:6.0-alpine
    container_name: happy8-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "happy8_redis_2025"
    networks:
      - happy8-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: happy8-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql://happy8_user:happy8_pass_2025@mysql:3306/happy8_miniprogram
      - REDIS_URL=redis://:happy8_redis_2025@redis:6379/0
      - SECRET_KEY=happy8_jwt_secret_key_2025_very_long_and_secure
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - ./src:/app/happy8_analyzer  # 挂载现有的Happy8分析器
    depends_on:
      - mysql
      - redis
    networks:
      - happy8-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: happy8-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - happy8-network

  # 前端开发服务器（可选，用于H5调试）
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: happy8-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://backend:8000
    networks:
      - happy8-network

volumes:
  mysql_data:
  redis_data:

networks:
  happy8-network:
    driver: bridge